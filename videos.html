<!DOCTYPE html>
<html>
<head>
    <title>Videos</title>

    <style>
        body { background:#111; color:white; font-family:Arial; margin:0; }

        h1 { text-align:center; padding:20px; }

        .container {
            display:flex;
        }

        .main-video {
            flex:3;
            padding:20px;
        }

        .sidebar {
            flex:1;
            padding:20px;
            background:#1a1a1a;
        }

        video {
            width:100%;
        }

        .rec video {
            margin-bottom:10px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<h1>🎥 Videos</h1>

<div class="container">

    <div class="main-video">
        <video id="player" controls src="jv1.mp4"></video>
    </div>

    <div class="sidebar">
        <h3>Recommended</h3>

        <div class="rec">
            <video onclick="playVideo('jv1.mp4')" src="jv1.mp4"></video>
        </div>

        <div class="rec">
            <video onclick="playVideo('jv2.mp4')" src="jv2.mp4"></video>
        </div>

        <p>No more content</p>
    </div>

</div>

<script>
function playVideo(src){
    const player = document.getElementById("player");
    player.src = src;
    player.load();
    player.play();
}
</script>

</body>
</html>
