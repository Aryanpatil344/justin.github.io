<!DOCTYPE html>
<html>
<head>
    <title>Video Layout</title>

    <style>
        body {
            margin:0;
            background:#ddd;
            font-family:Arial;
        }

        .wrapper {
            border:5px solid black;
            margin:20px;
            padding:20px;
            height:90vh; /* 🔥 IMPORTANT */
            box-sizing:border-box;
        }

        .container {
            display:flex;
            gap:20px;
            height:100%; /* fill wrapper */
        }

        .main {
            flex:3;
            border:5px solid black;
            overflow:hidden;
        }

        /* 🔥 MAIN VIDEO FULL BOX */
        .main video {
            width:100%;
            height:100%;
            object-fit:cover; /* fills like your drawing */
        }

        .sidebar {
            flex:1.5;
            display:grid;
            grid-template-columns:repeat(2, 1fr);
            gap:15px;
            align-content:start; /* keep items at top */
        }

        .box {
            border:5px solid black;
            aspect-ratio:1/1;
            overflow:hidden;
        }

        .box video {
            width:100%;
            height:100%;
            object-fit:cover;
            cursor:pointer;
        }

        /* MOBILE */
        @media (max-width:768px) {
            .wrapper {
                height:auto; /* allow scroll on mobile */
            }

            .container {
                flex-direction:column;
            }

            .main {
                height:300px; /* fixed height for mobile */
            }

            .sidebar {
                grid-template-columns:repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

<div class="wrapper">

    <div class="container">

        <!-- MAIN VIDEO -->
        <div class="main">
            <video id="player" controls></video>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar" id="videoList"></div>

    </div>

</div>

<script>
const videos = [
    "jv1.mp4",
    "jv2.mp4"
];

const list = document.getElementById("videoList");
const player = document.getElementById("player");

/* default video */
player.src = videos[0];

videos.forEach(src => {
    const box = document.createElement("div");
    box.className = "box";

    const vid = document.createElement("video");
    vid.src = src;

    vid.onclick = () => {
        player.src = src;
        player.load();
        player.play();
    };

    box.appendChild(vid);
    list.appendChild(box);
});
</script>

</body>
</html>
