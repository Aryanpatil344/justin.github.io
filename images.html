<!DOCTYPE html>
<html>
<head>
    <title>Images</title>

    <style>
        body {
            margin:0;
            background:#0d0d0d;
            color:white;
            font-family:Arial, sans-serif;
        }

        h1 {
            text-align:center;
            padding:20px;
        }

        .gallery {
            display:grid;
            grid-template-columns: repeat(4, 1fr);
            gap:20px;
            padding:20px;
        }

        /* Mobile view */
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .image-box {
            height:220px;
            overflow:hidden;
            border-radius:12px;
        }

        .image-box img {
            width:100%;
            height:100%;
            object-fit:cover;
            cursor:pointer;
            transition:0.3s;
        }

        .image-box img:hover {
            transform:scale(1.1);
        }

        /* FULLSCREEN */
        #popup {
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.95);
            display:none;
            justify-content:center;
            align-items:center;
        }

        #popup img {
            max-width:90%;
            max-height:90%;
        }

        #closeBtn {
            position:absolute;
            top:20px;
            right:30px;
            font-size:30px;
            cursor:pointer;
        }

    </style>
</head>

<body>

<h1>📸 Aryan's Image Gallery</h1>

<div class="gallery" id="gallery"></div>

<!-- POPUP -->
<div id="popup">
    <span id="closeBtn" onclick="closeImage()">✖</span>
    <img id="popup-img">
</div>

<script>
window.onload = function(){

let images = [
    "jpic1.jpeg",
    "jpic2.jpeg",
    "jpic3.jpeg",
    "jpic4.png",
    "jpic5.png",
    "jpic6.png",
    "jpic7.png",
    "jpic8.png"
];  // 👈 Only edit this

let gallery = document.getElementById("gallery");

// AUTO CREATE GALLERY
images.forEach((img, index) => {
    let box = document.createElement("div");
    box.className = "image-box";

    let image = document.createElement("img");
    image.src = img;

    image.onclick = function(){
        openImage(img);
    };

    box.appendChild(image);
    gallery.appendChild(box);
});

// FUNCTIONS
window.openImage = function(src){
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popup-img").src = src;
}

window.closeImage = function(){
    document.getElementById("popup").style.display = "none";
}

}
</script>

</body>
</html>
