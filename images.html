<!DOCTYPE html>
<html>
<head>
    <title>Images</title>
    <style>
        body { background:#111; color:white; font-family:Arial; }

        h1 { text-align:center; }

        .gallery {
            display:grid;
            grid-template-columns: repeat(4, 1fr);
            gap:20px;
            padding:20px;
        }

        img {
            width:100%;
            border-radius:10px;
        }
    </style>
</head>

<body>

<h1>📸 Images</h1>

<div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
</div>

</body>
</html>
