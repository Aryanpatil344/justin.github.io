<!DOCTYPE html>
<html>
<head>
    <title>Images</title>

    <style>
        body { margin:0; background:#0d0d0d; color:white; font-family:Arial; }
        h1 { text-align:center; padding:20px; }

        .gallery {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
            gap:20px;
            padding:20px;
        }

        .image-box img:hover {
                       transform: scale(1.1);
                       transition: 0.3s;
                }
        .image-box { height:220px; overflow:hidden; border-radius:12px; }

        .image-box img {
            width:100%; height:100%; object-fit:cover; cursor:pointer;
        }

        #popup {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.95);
            display:none; justify-content:center; align-items:center;
        }

        #popup img { max-width:90%; max-height:90%; }

    </style>
</head>

<body>

<h1>📸 Aryan's Gallery</h1>

<div class="gallery" id="gallery"></div>

<div id="popup" onclick="this.style.display='none'">
    <img id="popup-img">
</div>

<script>
let images = ["jpic1.jpeg","jpic2.jpeg","jpic3.jpeg"];
let gallery = document.getElementById("gallery");

// SAFE CHECK
if(gallery){
    images.forEach((img)=>{
        let box = document.createElement("div");
        box.className = "image-box";

        let image = document.createElement("img");
        image.src = img;

        image.onclick = function(){
            document.getElementById("popup").style.display="flex";
            document.getElementById("popup-img").src = img;
        };

        box.appendChild(image);
        gallery.appendChild(box);
    });
}
</script>

</body>
</html>
