<!DOCTYPE html>
<html>
<head>
    <title>Images</title>

    <style>
        body {
            background:#111;
            color:white;
            font-family:Arial;
        }

        h1 {
            text-align:center;
        }

        .gallery {
            display:grid;
            grid-template-columns: repeat(4, 1fr);
            gap:20px;
            padding:20px;
        }

        .image-box {
            width:100%;
            height:200px;
            overflow:hidden;
            border-radius:10px;
        }

        .image-box img {
            width:100%;
            height:100%;
            object-fit:cover;
            cursor:pointer;
        }

        /* Fullscreen popup */
        #popup {
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.9);
            display:none;
            justify-content:center;
            align-items:center;
        }

        #popup img {
            max-width:90%;
            max-height:90%;
        }
    </style>
</head>

<body>

<h1>📸 Images</h1>

<div class="gallery">

    <div class="image-box">
        <img src="photo1.jpg" onclick="openImage(this.src)">
    </div>

    <div class="image-box">
        <img src="photo2.jpg" onclick="openImage(this.src)">
    </div>

</div>

<!-- Popup -->
<div id="popup" onclick="closeImage()">
    <img id="popup-img">
</div>

<script>
function openImage(src){
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popup-img").src = src;
}

function closeImage(){
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
