<!DOCTYPE html>
<html>
<head>
    <title>Images</title>

    <style>
        body {
            margin:0;
            background:#0d0d0d;
            color:white;
            font-family:Arial, sans-serif;
        }

        h1 {
            text-align:center;
            padding:20px;
            letter-spacing:2px;
        }

        .gallery {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap:20px;
            padding:20px;
        }

        .image-box {
            height:220px;
            overflow:hidden;
            border-radius:12px;
            position:relative;
        }

        .image-box img {
            width:100%;
            height:100%;
            object-fit:cover;
            transition:0.4s;
            cursor:pointer;
        }

        .image-box:hover img {
            transform:scale(1.1);
        }

        /* FULLSCREEN POPUP */
        #popup {
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.95);
            display:none;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        #popup img {
            max-width:90%;
            max-height:80%;
            border-radius:10px;
        }

        #closeBtn {
            position:absolute;
            top:20px;
            right:30px;
            font-size:30px;
            cursor:pointer;
        }

        /* NAV BUTTONS */
        .nav-btn {
            position:absolute;
            top:50%;
            transform:translateY(-50%);
            font-size:40px;
            cursor:pointer;
            padding:10px;
        }

        #prev { left:20px; }
        #next { right:20px; }

    </style>
</head>

<body>

<h1>📸 Aryan's Image Gallery</h1>

<div class="gallery">

    <div class="image-box">
        <img src="jpic1.jpeg" onclick="openImage(0)">
    </div>

    <div class="image-box">
        <img src="photo2.jpg" onclick="openImage(1)">
    </div>

</div>

<!-- FULLSCREEN VIEW -->
<div id="popup">
    <span id="closeBtn" onclick="closeImage()">✖</span>

    <span id="prev" class="nav-btn" onclick="prevImage()">❮</span>
    <img id="popup-img">
    <span id="next" class="nav-btn" onclick="nextImage()">❯</span>
</div>

<script>
let images = ["jpic1.jpeg", "photo2.jpg"];
let currentIndex = 0;

function openImage(index){
    currentIndex = index;
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popup-img").src = images[currentIndex];
}

function closeImage(){
    document.getElementById("popup").style.display = "none";
}

function nextImage(){
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById("popup-img").src = images[currentIndex];
}

function prevImage(){
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById("popup-img").src = images[currentIndex];
}
</script>

</body>
</html>
